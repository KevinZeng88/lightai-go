# LightAI Go Server - Release Configuration
# For deployment on GPU servers. Copy and customize as needed.

host: "0.0.0.0"
port: 18080
log_level: info
db_path: data/lightai.db
dev_mode: false

# Change this token for production.
agent_token: "lightai-agent-token-change-me"

logging:
  level: info
  format: text
  dir: logs
  file: lightai-server.log
  stdout: false
  file_enabled: true
  append: true
  max_size_mb: 100
  max_files: 10
  retention_days: 30

observability:
  mode: bundled

gpu:
  profile: production

node_offline_threshold: 20s
