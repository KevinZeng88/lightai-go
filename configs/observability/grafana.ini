# LightAI Go - Grafana Configuration (bundled mode)
# Port: 3000. Managed by scripts/start-observability.sh

[paths]
data = data/grafana
logs = logs
plugins = data/grafana/plugins
provisioning = deploy/observability/grafana/provisioning

[server]
http_addr = 0.0.0.0
http_port = 13000
domain = localhost
root_url = %(protocol)s://%(domain)s:%(http_port)s/

[database]
type = sqlite3
path = data/grafana/grafana.db

[security]
admin_user = admin
# admin_password set via GF_SECURITY_ADMIN_PASSWORD env var at startup

[analytics]
reporting_enabled = false
check_for_updates = false

[auth.anonymous]
enabled = false

[auth.basic]
enabled = true
