# LightAI Go Agent - Default Configuration (auto-detect GPU)
agent_id: agent-01
# node_id is generated on first start and persisted in runtime/agent-identity.json.
# Do not copy node_id across machines.
server_url: http://127.0.0.1:18080
agent_token: "lightai-agent-token-change-me"
log_level: info
data_dir: data
request_timeout: 5s

# Primary IP: auto-detected by Agent if empty. Set explicitly for multi-NIC hosts.
# primary_ip: ""

advertised_address: ""

metrics:
  enabled: true
  host: "0.0.0.0"
  scheme: http
  port: 19091
  path: /metrics
  advertise_addr: ""

heartbeat:
  interval: 2s

gpu:
  profile: production
  # collector_mode: auto (default), explicit (use enabled flags), disabled (no GPU)
  collector_mode: auto

collectors:
  system:
    enabled: true
    interval: 5s
  mock_gpu:
    enabled: false
  gpu_external:
    enabled: true
    timeout: 5s
    # auto_detect.probes can override the built-in probe list.
    # Omit to use built-in probes (nvidia, metax).
    # auto_detect:
    #   probes:
    #     - name: "nvidia"
    #       vendor: "nvidia"
    #       discover_cmd: "deploy/collectors/gpu/nvidia/discover.sh"
    #       metrics_cmd: "deploy/collectors/gpu/nvidia/metrics.sh"
    #     - name: "metax"
    #       vendor: "metax"
    #       discover_cmd: "deploy/collectors/gpu/metax/discover.sh"
    #       metrics_cmd: "deploy/collectors/gpu/metax/metrics.sh"
  report_interval: 5s

model_browser:
  enabled: true
  allowed_roots:
    - /home/kzeng/models
    - /models
    - /data/models
    - /data/part2/MX-C500/model
  max_entries: 1000
  max_scan_depth: 2
  follow_symlinks: false

logging:
  format: text
  level: info
  dir: logs
  file: lightai-agent.log
  stdout: false
  file_enabled: true
  append: true
  max_size_mb: 100
  max_files: 10
  retention_days: 30
