# LightAI Go Agent - Development Configuration
agent_id: agent-dev-01
server_url: http://127.0.0.1:18080
agent_token: "dev-agent-token"
log_level: debug
data_dir: data
request_timeout: 5s

# Network: listen vs advertise.
# 127.0.0.1 for local dev; 0.0.0.0 for LAN deployment.
advertised_address: "127.0.0.1"

metrics:
  enabled: true
  host: "127.0.0.1"
  scheme: http
  port: 19091
  path: /metrics
  # Advertised address for Prometheus scrape targets (LAN: use actual IP).
  advertise_addr: "127.0.0.1:19091"

heartbeat:
  interval: 2s

gpu:
  profile: development

collectors:
  system:
    enabled: true
    interval: 5s
  mock_gpu:
    enabled: false
  # External GPU collectors (default product path).
  gpu_external:
    enabled: true
    timeout: "5s"
    collectors:
      - name: "nvidia"
        vendor: "nvidia"
        enabled: true
        discover_cmd: "deploy/collectors/gpu/nvidia/discover.sh"
        metrics_cmd: "deploy/collectors/gpu/nvidia/metrics.sh"
      - name: "metax"
        vendor: "metax"
        enabled: false
        discover_cmd: "deploy/collectors/gpu/metax/discover.sh"
        metrics_cmd: "deploy/collectors/gpu/metax/metrics.sh"
      - name: "amd"
        vendor: "amd"
        enabled: false
        discover_cmd: "deploy/collectors/gpu/amd/discover.sh"
        metrics_cmd: "deploy/collectors/gpu/amd/metrics.sh"
  report_interval: 5s

logging:
  level: "debug"
  dir: "logs"
  file: "lightai-agent.log"
  stdout: true
  file_enabled: true
  max_size_mb: 50
  max_files: 5
  retention_days: 7
