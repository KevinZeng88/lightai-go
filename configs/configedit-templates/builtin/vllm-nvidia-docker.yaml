template_id: vllm-nvidia-docker-configedit-v1
kind: config_edit_template
version: 1
applies_to:
  backend: vllm
  backend_versions: [latest]
  runtime_kind: docker
  vendors: [nvidia]
metadata:
  display_name: vLLM NVIDIA Docker
  source: built_in
views:
  default_view: normal
  supported_views: [normal, advanced, developer]
layers:
  backend_runtime:
    editable: true
  node_backend_runtime:
    editable: true
    copy_from_parent: copy_effective_snapshot
  deployment:
    editable: true
    copy_from_parent: copy_effective_snapshot
sections:
  - key: basic
    label: Basic
    order: 10
    view: normal
  - key: resources
    label: Resources
    order: 20
    view: normal
  - key: service
    label: Service
    order: 30
    view: normal
  - key: runtime
    label: Runtime Parameters
    order: 40
    view: normal
  - key: advanced
    label: Advanced
    order: 90
    view: advanced
    collapsed: true
components:
  - key: runtime.device_binding
    component: accelerator_binding
    renderer: accelerator_binding
    label: Device Binding
    section: resources
    view: normal
    order: 10
    effects:
      - type: device_binding
        target: docker.gpus
        value_from: docker_gpu_option
      - type: env
        target: env
        key_from: visible_env_key
        value_from: visible_env_value
  - key: service.port_binding
    component: port_binding
    renderer: port_binding
    label: Service Port
    section: service
    view: normal
    order: 10
    effects:
      - type: port
        target: docker.port_mapping
      - type: cli_arg
        flag: --port
        value_from: container_port
  - key: runtime.model_mount
    component: model_mount
    renderer: mount_form
    label: Model Mount
    section: advanced
    view: advanced
    order: 10
    effects:
      - type: mount
        target: docker.mounts
  - key: runtime.health
    component: health_check
    renderer: health_check_form
    label: Health Check
    section: service
    view: advanced
    order: 20
    effects:
      - type: health_check
        target: health_check
  - key: model_runtime.max_model_len
    component: field
    renderer: number
    label: Max Model Length
    section: runtime
    view: normal
    order: 10
    effects:
      - type: cli_arg
        flag: --max-model-len
        value_from: self.value
  - key: model_runtime.gpu_memory_utilization
    component: field
    renderer: number
    label: GPU Memory Utilization
    section: runtime
    view: normal
    order: 20
    effects:
      - type: cli_arg
        flag: --gpu-memory-utilization
        value_from: self.value
