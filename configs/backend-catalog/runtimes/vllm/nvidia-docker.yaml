id: runtime.vllm.nvidia-docker
backend_id: backend.vllm
backend_version_id: vllm-v0.23.0
slug: vllm-nvidia-docker
managed_by: system
runner_type: docker
vendor: nvidia
image_ref: vllm/vllm-openai:v0.23.0
mount_policy:
  model:
    container_mount_dir: /models
    readonly: true

model_mount:
  container_path: /models
  readonly: true
docker_options:
  ipc_mode: host
  shm_size: 16gb
env:
  CUDA_VISIBLE_DEVICES: "{{vendor_visible_devices}}"
verification:
  status: verified
