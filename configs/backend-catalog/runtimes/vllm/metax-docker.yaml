id: runtime.vllm.metax-docker
backend_id: backend.vllm
backend_version_id: vllm-v0.23.0
slug: vllm-metax-docker
managed_by: system
runner_type: docker
vendor: metax
image_ref: vllm-metax:latest
mount_policy:
  model:
    container_mount_dir: /models
    readonly: true

model_mount:
  container_path: /models
  readonly: true
docker_options:
  devices: [/dev/dri, /dev/mxcd, /dev/infiniband]
  optional_devices: [/dev/mem]
  group_add: [video]
  uts_mode: host
  ipc_mode: host
  privileged: true
  security_opt: [seccomp=unconfined, apparmor=unconfined]
  shm_size: 100gb
  ulimits:
    memlock: "-1"
  MACA_SMALL_PAGESIZE_ENABLE: "1"
  PYTORCH_ENABLE_PG_HIGH_PRIORITY_STREAM: "1"
verification:
  status: requires_hardware_validation
