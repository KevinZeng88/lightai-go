id: sglang-v0.5.13.post1
backend_id: backend.sglang
slug: sglang-v0-5-13-post1
version: v0.5.13.post1
managed_by: system
source: system
readonly: true
protocol: openai-compatible
image_candidates:
  - lmsysorg/sglang:v0.5.13.post1-cu129-runtime
  - lmsysorg/sglang:v0.5.13.post1-cu130-runtime
  - lmsysorg/sglang:latest-runtime
  - lmsysorg/sglang:latest
default_port: 30000
default_host: 0.0.0.0
default_model_mount:
  container_path: /models
  readonly: true
default_endpoints:
  models: /v1/models
  chat_completions: /v1/chat/completions
  completions: /v1/completions
  embeddings: /v1/embeddings
capabilities:
  - models
  - chat_completions
  - completions
  - embeddings
  - openai_compatible
capabilities_detail:
  supported_formats: [huggingface, safetensors]
  supported_tasks: [chat, completion, embedding]
  supported_capabilities: [chat, completion, embedding]
  model_path_modes: [directory]
  serving_protocols: [openai_compatible]
  test_endpoints:
    chat: /v1/chat/completions
    completion: /v1/completions
    embedding: /v1/embeddings
    models: /v1/models
default_entrypoint:
  - sglang
  - serve
default_args:
  - --model-path
  - "{{model_container_path}}"
default_args_schema:
  - name: --model-path
    group: startup
    label: Model Path
    required: true
    value: "{{MODEL_CONTAINER_PATH}}"
  - name: --host
    group: startup
    label: Listen Host
    required: true
    default: "0.0.0.0"
  - name: --port
    group: startup
    label: Container Port
    required: true
    value: "{{container_port}}"
  - name: --tp
    group: parallelism
    label: Tensor Parallel Size
    optional: true
  - name: --tensor-parallel-size
    group: parallelism
    label: Tensor Parallel Size (alias)
    optional: true
  - name: --dp
    group: parallelism
    label: Data Parallel Size
    optional: true
  - name: --enable-metrics
    group: observability
    label: Enable Metrics
    optional: true
  - name: --log-level
    group: observability
    label: Log Level
    optional: true
  - name: --served-model-name
    group: startup
    label: Served Model Name
    optional: true
  - name: --mem-fraction-static
    group: performance
    label: Static Memory Fraction
    optional: true
  - name: --context-length
    group: performance
    label: Context Length
    optional: true
  - name: --max-running-requests
    group: performance
    label: Max Running Requests
    optional: true
  - name: --disable-cuda-graph
    group: performance
    label: Disable CUDA Graph
    optional: true
health_check:
  type: http
  path: /v1/models
  success_status:
    - 200
  startup_timeout_seconds: 120
vendor_options:
  resource_controls:
    gpu_memory_fraction:
      arg: "--mem-fraction-static"
      type: float
      min: 0.1
      max: 0.95
      default: 0.9
      semantics: static_weights_and_kv_pool
    max_running_requests:
      arg: "--max-running-requests"
      type: int
    chunked_prefill_size:
      arg: "--chunked-prefill-size"
      type: int
    attention_backend:
      arg: "--attention-backend"
      type: enum
      values: ["auto", "flashinfer", "triton", "fa3"]
official_reference_note:
  - SGLang v0.5.13.post1 tag verified with git ls-remote against github.com/sgl-project/sglang.git.
  - SGLang install docs: Docker images are lmsysorg/sglang and lmsysorg/sglang:latest-runtime.
