id: vllm-v0.23.0
backend_id: backend.vllm
slug: vllm-v0-23-0
version: v0.23.0
managed_by: system
source: system
readonly: true
protocol: openai-compatible
image_candidates:
  - vllm/vllm-openai:v0.23.0
  - vllm/vllm-openai:v0.23.0-cu129-ubuntu2404
  - vllm/vllm-openai:latest
default_port: 8000
default_host: 0.0.0.0
default_model_mount:
  container_path: /models
  readonly: true
default_endpoints:
  models: /v1/models
  chat_completions: /v1/chat/completions
  completions: /v1/completions
  embeddings: /v1/embeddings
capabilities:
  - models
  - chat_completions
  - completions
  - embeddings
  - openai_compatible
capabilities_detail:
  supported_formats: [huggingface, safetensors]
  supported_tasks: [chat, completion, embedding]
  supported_capabilities: [chat, completion, embedding, vision]
  model_path_modes: [directory]
  serving_protocols: [openai_compatible]
  test_endpoints:
    chat: /v1/chat/completions
    completion: /v1/completions
    embedding: /v1/embeddings
    models: /v1/models
default_entrypoint:
  - vllm
  - serve
default_command:
  - --model
  - "{{model_container_path}}"
default_args_schema:
  - name: --model
    group: startup
    label: Model Path
    required: true
    value: "{{MODEL_CONTAINER_PATH}}"
  - name: --host
    group: startup
    label: Listen Host
    required: true
    default: "0.0.0.0"
  - name: --port
    group: startup
    label: Container Port
    required: true
    value: "{{container_port}}"
  - name: --served-model-name
    group: startup
    label: Served Model Name
    optional: true
  - name: --tensor-parallel-size
    group: parallelism
    label: Tensor Parallel Size
    optional: true
  - name: --pipeline-parallel-size
    group: parallelism
    label: Pipeline Parallel Size
    optional: true
  - name: --max-model-len
    group: performance
    label: Max Model Length
    optional: true
  - name: --gpu-memory-utilization
    group: performance
    label: GPU Memory Utilization
    optional: true
  - name: --max-num-seqs
    group: performance
    label: Max Concurrent Sequences
    optional: true
  - name: --max-num-batched-tokens
    group: performance
    label: Max Batched Tokens
    optional: true
  - name: --kv-cache-dtype
    group: performance
    label: KV Cache Data Type
    optional: true
  - name: --dtype
    group: performance
    label: Model Data Type
    optional: true
  - name: --swap-space
    group: performance
    label: Swap Space (GB)
    optional: true
  - name: --cpu-offload-gb
    group: performance
    label: CPU Offload (GB)
    optional: true
  - name: --enforce-eager
    group: performance
    label: Enforce Eager Mode
    optional: true
  - name: --safetensors-load-strategy
    group: performance
    label: Safetensors Load Strategy
    optional: true
  - name: --trust-remote-code
    group: security
    label: Trust Remote Code
    optional: true
  - name: --download-dir
    group: advanced
    label: Download Directory
    optional: true
health_check:
  type: http
  path: /v1/models
  success_status:
    - 200
  startup_timeout_seconds: 120
vendor_options:
  resource_controls:
    gpu_memory_fraction:
      arg: "--gpu-memory-utilization"
      type: float
      min: 0.1
      max: 0.95
      default: 0.9
      semantics: per_instance_backend_allocation_budget
    max_model_len:
      arg: "--max-model-len"
      type: int
    max_num_seqs:
      arg: "--max-num-seqs"
      type: int
    max_num_batched_tokens:
      arg: "--max-num-batched-tokens"
      type: int
    pipeline_parallel_size:
      arg: "--pipeline-parallel-size"
      type: int
    kv_cache_dtype:
      arg: "--kv-cache-dtype"
      type: enum
      values: ["auto", "fp8", "fp8_e5m2", "fp8_e4m3"]
    dtype:
      arg: "--dtype"
      type: enum
      values: ["auto", "half", "float16", "bfloat16", "float32"]
    swap_space:
      arg: "--swap-space"
      type: float
      min: 0
      max: 128
      default: 4
    cpu_offload_gb:
      arg: "--cpu-offload-gb"
      type: float
      min: 0
      default: 0
    safetensors_load_strategy:
      arg: "--safetensors-load-strategy"
      type: enum
      values: ["auto", "np", "pt", "tf", "flax", "torch"]
official_reference_note:
  - vLLM official Docker docs: vllm/vllm-openai runs OpenAI-compatible server.
  - vLLM online serving docs: supports /v1/completions, /v1/chat/completions, /v1/embeddings.
  - vLLM v0.23.0 release line used as current system version baseline.
