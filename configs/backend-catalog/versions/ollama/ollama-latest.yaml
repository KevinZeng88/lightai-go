id: backend-version.ollama.latest
backend_id: backend.ollama
slug: ollama-latest
version: latest
managed_by: system
default_entrypoint: ["ollama", "serve"]
default_container_port: 11434
default_args: []
default_images:
  nvidia: ollama/ollama:latest
  cpu: ollama/ollama:latest
# Ollama uses ollama_managed path mode (not directory/file) — models are referenced
# by name/tag, not filesystem path. Serving protocol is native ollama (not openai-compatible).
# Canonical capabilities are in DB backend_versions.capabilities_json (V27 repair).
capabilities_json: '{"supported_formats":["ollama"],"supported_tasks":["chat","completion"],"supported_capabilities":["chat","completion"],"model_path_modes":["ollama_managed"],"serving_protocols":["ollama"],"test_endpoints":{"chat":"/api/chat","completion":"/api/generate"}}'
