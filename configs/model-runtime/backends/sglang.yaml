apiVersion: lightai/v1
kind: InferenceBackend
metadata:
  name: sglang
spec:
  displayName: SGLang
  description: "SGLang inference backend"
  protocol:
    type: openai-compatible
    modelsPath: /v1/models
    chatCompletionsPath: /v1/chat/completions
    completionsPath: /v1/completions
  defaultVersion: "0.4.6"
  parameterFormat: space
  commonParameters:
    - "--tp"
    - "--context-length"
    - "--mem-fraction-static"
    - "--served-model-name"
  defaultEnv: {}
  isBuiltIn: true
  isEnabled: true
