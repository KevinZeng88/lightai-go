apiVersion: lightai/v1
kind: BackendVersion
metadata:
  backend: sglang
  version: "0.4.6"
spec:
  isDefault: true
  defaultEntrypoint:
    - python
    - -m
    - sglang.launch_server
  defaultArgs:
    - "{{model_container_path}}"
    - "--host"
    - "0.0.0.0"
    - "--port"
    - "{{container_port}}"
    - "--served-model-name"
    - "{{served_model_name}}"
  defaultBackendParams: []
  parameters:
    - name: served_model_name
      cli_name: "--served-model-name"
      type: string
      required: true
    - name: tp
      cli_name: "--tp"
      type: integer
      default: 1
      required: false
  env: {}
  healthCheck:
    path: /v1/models
    expectedStatus: 200
    startupTimeoutSeconds: 120
    intervalSeconds: 2
    timeoutSeconds: 5
  defaultContainerPort: 30000
  defaultImages:
    nvidia: "lmsysorg/sglang:v0.4.6"
