apiVersion: lightai/v1
kind: BackendVersion
metadata:
  backend: llamacpp
  version: "b4817"
spec:
  isDefault: true
  defaultEntrypoint: []
  defaultArgs:
    - "-m"
    - "{{model_container_path}}"
    - "--host"
    - "0.0.0.0"
    - "--port"
    - "{{container_port}}"
    - "-ngl"
    - "99"
  defaultBackendParams: []
  parameters:
    - name: ngl
      cli_name: "-ngl"
      type: integer
      default: 99
      required: false
    - name: ctx_size
      cli_name: "--ctx-size"
      type: integer
      default: 4096
      required: false
  env: {}
  healthCheck:
    path: /health
    expectedStatus: 200
    startupTimeoutSeconds: 60
    intervalSeconds: 2
    timeoutSeconds: 5
  defaultContainerPort: 8080
  defaultImages:
    nvidia: "ghcr.io/ggerganov/llama.cpp:server-b4817"
