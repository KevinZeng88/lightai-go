# LightAI Go Server - Development Configuration
host: "127.0.0.1"
port: 18080
log_level: debug
db_path: data/lightai.db
dev_mode: true

agent_token: "dev-agent-token"

logging:
  format: text
  level: "debug"
  dir: "logs"
  file: "lightai-server.log"
  stdout: false
  file_enabled: true
  max_size_mb: 50
  max_files: 5
  retention_days: 7

observability:
  mode: disabled

gpu:
  profile: development

node_offline_threshold: 20s
