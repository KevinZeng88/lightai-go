# LightAI Go - Prometheus Configuration (bundled mode)
# LightAI manages this config and starts Prometheus as a managed subprocess.

global:
  scrape_interval: 5s
  evaluation_interval: 10s
  external_labels:
    cluster: lightai-dev

scrape_configs:
  # LightAI Server metrics
  - job_name: lightai-server
    static_configs:
      - targets:
          - "127.0.0.1:18080"

  # LightAI Agent metrics (via HTTP SD from Server /metrics/targets)
  - job_name: lightai-agents
    http_sd_configs:
      - url: "http://127.0.0.1:18080/metrics/targets"
        refresh_interval: 30s

  # Prometheus self metrics
  - job_name: prometheus
    static_configs:
      - targets:
          - "127.0.0.1:19090"

rule_files:
  - "deploy/observability/prometheus/rules/lightai.rules.yml"
